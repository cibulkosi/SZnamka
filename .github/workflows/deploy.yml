name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # NOTE: --commit-message override is needed because Cloudflare API rejects
          # commit messages with certain non-ASCII chars (em-dash, Czech apostrophes).
          # We use the commit SHA + branch as a safe ASCII identifier instead.
          command: pages deploy out --project-name=cosmatch --commit-message="Deploy ${{ github.sha }} from ${{ github.ref_name }}" --commit-hash=${{ github.sha }} --branch=main

      # ── IndexNow: notify Bing + SeznamBot about new/updated pages ──
      # Pings the changed URLs from the latest commit so search engines re-crawl them within minutes
      - name: Wait 30 s for Cloudflare propagation
        run: sleep 30

      - name: Notify IndexNow
        run: |
          KEY="522471b7727f05479fa217d66b1746776c59c3871f1af5d04591154cb9a1152b"
          # Get list of pages: pull from generated out/ (static export)
          URLS=$(find out -name "index.html" -type f | sed 's|out||; s|/index.html|/|; s|^|https://cosmatch.cz|' | sort -u)
          COUNT=$(echo "$URLS" | wc -l)
          echo "Submitting $COUNT URLs to IndexNow"
          # IndexNow supports up to 10 000 URLs per request as JSON array
          JSON=$(echo "$URLS" | python3 -c "
          import sys, json
          urls = [l.strip() for l in sys.stdin if l.strip()]
          print(json.dumps({
            'host': 'cosmatch.cz',
            'key': '$KEY',
            'keyLocation': f'https://cosmatch.cz/$KEY.txt',
            'urlList': urls
          }))
          ")
          curl -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$JSON" \
            --fail-with-body || echo "IndexNow ping returned non-zero (ok — they 202-accept)"
