  .btn-primary { background:linear-gradient(135deg,#9333ea,#ec4899); color:white; }
  .btn-primary:hover { opacity:.9; transform:scale(1.02); }
  .btn-secondary { background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2); }
  .btn-secondary:hover { background:rgba(255,255,255,0.2); }
  .input { width:100%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:.75rem; padding:.75rem 1rem; color:white; outline:none; box-sizing:border-box; transition:border .2s; }

  .input::placeholder { color:rgba(255,255,255,0.35); }
  select.input option { background:#1a0533; }
  .page { display:none; min-height:100vh; }
  .page.active { display:block; }
  .badge { display:inline-flex; align-items:center; font-size:.75rem; padding:.25rem .6rem; border-radius:9999px; font-weight:500; margin:.15rem; }
  .badge-soul { background:linear-gradient(135deg,#7c3aed,#6d28d9); color:white; }
  .badge-love { background:linear-gradient(135deg,#db2777,#be185d); color:white; }
  .badge-beneficial { background:linear-gradient(135deg,#059669,#047857); color:white; }
  .badge-fatal { background:linear-gradient(135deg,#ea580c,#dc2626); color:white; }
  .badge-challenging { background:linear-gradient(135deg,#d97706,#b45309); color:white; }
  .badge-mutual { background:linear-gradient(135deg,#0891b2,#2563eb); color:white; font-weight:700; }
  .score-ring { position:relative; display:inline-flex; align-items:center; justify-content:center; }
  .spinner { animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .swipe-pass { transform:scale(.95) rotate(-3deg); opacity:.5; transition:all .3s; }

function $(id) { return document.getElementById(id) }
function show(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
  $(pageId).classList.add('active')
  window.scrollTo(0,0)
}
function avatarGrad(name) { return AVATAR_GRADIENTS[name.charCodeAt(0) % AVATAR_GRADIENTS.length] }
function avatarEl(name, size='lg') {
  const d = size==='lg'?'width:80px;height:80px;font-size:1.75rem':'width:48px;height:48px;font-size:1.1rem'
  return `<div class="rounded-full bg-gradient-to-br ${avatarGrad(name)} flex items-center justify-center font-bold text-white flex-shrink-0" style="${d}">${name.charAt(0).toUpperCase()}</div>`
}
function scoreRing(score) {
  const r=24, circ=2*Math.PI*r, prog=(score/100)*circ
  const color=score>=70?'#a855f7':score>=40?'#ec4899':'#f59e0b'
  return `<div class="score-ring"><svg width="64" height="64" viewBox="0 0 64 64"><circle cx="32" cy="32" r="${r}" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="5"/><circle cx="32" cy="32" r="${r}" fill="none" stroke="${color}" stroke-width="5" stroke-dasharray="${prog} ${circ}" stroke-linecap="round" transform="rotate(-90 32 32)"/></svg><span style="position:absolute;font-size:.8rem;font-weight:700;color:${color}">${score}</span></div>`
}
function compatBadges(c, l='cs') {
  if(!c) return '<span style="color:rgba(255,255,255,0.3);font-size:.8rem">No data</span>'
  let html = ''
  if(c.is_mutual) html += `<span class="badge badge-mutual">↔ ${l==='cs'?'Oboustranná':'Mutual'}</span>`
  if(c.soul_mates) html += `<span class="badge badge-soul">🔮 ${l==='cs'?'Spřízněné duše':'Soul Mates'}</span>`
  if(c.love_friendship) html += `<span class="badge badge-love">💚 ${l==='cs'?'Láska & přátelství':'Love & Friendship'}</span>`
  if(c.beneficial) html += `<span class="badge badge-beneficial">🌟 ${l==='cs'?'Prospěšné':'Beneficial'}</span>`
  if(c.fatal_attraction) html += `<span class="badge badge-fatal">🔥 ${l==='cs'?'Osudová přitažlivost':'Fatal Attraction'}</span>`
  if(c.challenging) html += `<span class="badge badge-challenging">⚡ ${l==='cs'?'Výzva':'Challenging'}</span>`
  return html || `<span style="color:rgba(255,255,255,0.3);font-size:.8rem">${l==='cs'?'Žádná shoda':'No match'}</span>`
}
function toast(msg, ok=true) {
  const d = document.createElement('div')
  d.style.cssText='position:fixed;bottom:20px;right:20px;z-index:9999;padding:.75rem 1.25rem;border-radius:.75rem;font-size:.875rem;font-weight:600;animation:slideIn .3s ease'
  d.style.background = ok ? 'linear-gradient(135deg,#9333ea,#ec4899)' : 'linear-gradient(135deg,#dc2626,#b91c1c)'
  d.style.color = 'white'
  d.textContent = msg
  document.body.appendChild(d)
  setTimeout(()=>d.remove(), 3000)
}
function hobbiesSelector(id) {
  return HOBBIES.map(h=>`<button type="button" onclick="toggleHobby(this,'${h}')" data-hobby="${h}" class="py-1 px-3 rounded-full text-sm border border-white/20 bg-white/10 hover:bg-white/20 transition-all">${h}</button>`).join('')
}
function toggleHobby(btn, h) {
  btn.classList.toggle('bg-purple-600')
  btn.classList.toggle('border-purple-500')
  btn.classList.toggle('bg-white/10')
}
function getSelectedHobbies() {
  return [...document.querySelectorAll('[data-hobby]')].filter(b=>b.classList.contains('bg-purple-600')).map(b=>b.dataset.hobby)
}

function saveUser(u) { localStorage.setItem('cosmatch_user', JSON.stringify(u)); user=u }
function loadUser() {
  const s=localStorage.getItem('cosmatch_user')
  if(s) { user=JSON.parse(s); return true }
  return false
}
function logout() { localStorage.removeItem('cosmatch_user'); user=null; showLanding() }

      ${[1,2,3].map(s=>`<div style="height:3px;flex:1;border-radius:9999px;background:${s<=regStep?'linear-gradient(90deg,#9333ea,#ec4899)':'rgba(255,255,255,0.15)'}" class="progress-bar"></div>`).join('')}
    </div>
    ${steps[regStep-1]}`
}

function regNext1() {
  regForm.name = $('r-name').value.trim()
  regForm.email = $('r-email').value.trim()
  regForm.day = $('r-day').value
  regForm.month = $('r-month').value ? parseInt($('r-month').value) : null

}
function regNext2() {
  regForm.city = $('r-city').value.trim()

}
async function doRegister() {
  const btn = $('reg-submit'), err = $('reg-error')
  btn.disabled=true; btn.textContent='⏳...'
  err.style.display='none'
  const bd = `${String(regForm.month).padStart(2,'0')}-${String(regForm.day).padStart(2,'0')}`
  regForm.hobbies = getSelectedHobbies()
  const {data, error} = await db.from('profiles').insert([{
    name:regForm.name, email:regForm.email,
    birthday:bd, birth_year:parseInt(regForm.birth_year)||1990,
    gender:regForm.gender||'other', looking_for:regForm.looking_for||'everyone',
    city:regForm.city, country:regForm.country, bio:regForm.bio,
    hobbies:regForm.hobbies, photos:[], premium:false, active:true
  }]).select().single()
  if(error) {
    err.textContent = error.message.includes('duplicate')?
      (lang==='cs'?'Tento e-mail je již registrován.':'This email is already registered.') : error.message
    err.style.display='block'; btn.disabled=false; btn.textContent='🚀 '+(lang==='cs'?'Dokončit':'Finish'); return
  }
  saveUser(data); toast(lang==='cs'?'Vítej v Cosmatch! 🪐':'Welcome to Cosmatch! 🪐')
  await loadDiscover()
}

  $('login-content').innerHTML = `

    <div style="margin-bottom:1rem"><label>E-mail</label><input class="input" id="l-email" type="email" placeholder="email@example.com" onkeydown="if(event.key==='Enter')doLogin()"></div>

  show('login')
}
async function doLogin() {
  const email = $('l-email').value.trim()
  const btn = $('login-btn'), err = $('login-error')
  if(!email) return
  btn.disabled=true; btn.textContent='⏳...'
  err.style.display='none'
  const {data, error} = await db.from('profiles').select('*').eq('email',email).single()
  if(error||!data) {
    err.textContent = lang==='cs'?'Profil nenalezen. Zkontroluj e-mail.':'Profile not found. Check your email.'
    err.style.display='block'; btn.disabled=false; btn.textContent='🚀 '+(lang==='cs'?'Přihlásit se':'Login'); return
  }
  saveUser(data); toast(lang==='cs'?`Vítej zpět, ${data.name}! 🪐`:`Welcome back, ${data.name}! 🪐`)
  await loadDiscover()
}

// DISCOVER
// ═══════════════════════════════════════════════════
async function loadDiscover() {
  show('discover')
  $('discover-content').innerHTML = `<div style="text-align:center;padding:4rem 0"><span style="font-size:3rem" class="spinner">🪐</span><p style="color:rgba(255,255,255,0.5);margin-top:1rem">${lang==='cs'?'Načítám...':'Loading...'}</p></div>`

  const {data:liked} = await db.from('likes').select('to_user').eq('from_user',user.id)
  const excludeIds = [user.id, ...(liked||[]).map(l=>l.to_user)]

  // Build filter - Supabase needs at least 1 ID to exclude
  let query = db.from('profiles').select('*').eq('active',true).neq('id',user.id)
  if(liked && liked.length > 0) {
    query = query.not('id','in',`(${liked.map(l=>l.to_user).join(',')})`)
  }
  const {data:profs} = await query.limit(60)

  if(!profs||profs.length===0) { discoverProfiles=[]; discoverIdx=0; renderDiscover(); return }

  const bdays = [...new Set(profs.map(p=>p.birthday))]
  const {data:compatData} = await db.from('compatibility').select('*').eq('date_a',user.birthday).in('date_b',bdays)
  discoverCompats={}
  compatData?.forEach(c=>{ discoverCompats[c.date_b]=c })

  // Sort: mutual first, then by score
  discoverProfiles = [...profs].sort((a,b)=>{
    const ca=discoverCompats[a.birthday], cb=discoverCompats[b.birthday]
    if(ca?.is_mutual&&!cb?.is_mutual) return -1
    if(!ca?.is_mutual&&cb?.is_mutual) return 1
    return (cb?.score||0)-(ca?.score||0)
  })
  discoverIdx=0
  renderDiscover()
}

function renderDiscover() {
  const navHtml = `
    <nav style="max-width:520px;margin:0 auto;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between">
      <a href="#" onclick="showLanding()" style="display:flex;align-items:center;gap:.5rem;text-decoration:none;color:white"><span style="font-size:1.25rem">🪐</span><strong>Cosmatch</strong></a>
      <div style="display:flex;gap:.6rem;align-items:center">
        <button onclick="toggleLang()" class="btn btn-secondary" style="padding:.3rem .6rem;font-size:.75rem">${lang==='cs'?'🇬🇧':'🇨🇿'}</button>
        <a href="#" onclick="loadMatches()" class="nav-link">💫 ${lang==='cs'?'Shody':'Matches'}</a>
        <button onclick="logout()" class="btn" style="background:none;border:none;color:rgba(255,255,255,0.35);font-size:.75rem;cursor:pointer">${lang==='cs'?'Odhlásit':'Logout'}</button>
      </div>
    </nav>`

  if(!discoverProfiles.length||discoverIdx>=discoverProfiles.length) {
    $('discover-content').innerHTML = navHtml + `
      <div style="max-width:480px;margin:2rem auto;padding:0 1rem">
        <div class="card" style="padding:3rem;text-align:center">
          <div style="font-size:3rem;margin-bottom:1rem">✨</div>
          <h3 style="font-size:1.25rem;font-weight:600;margin-bottom:.75rem">${lang==='cs'?'Momentálně nic dalšího':'No more profiles right now'}</h3>
          <p style="color:rgba(255,255,255,0.55);margin-bottom:1.5rem">${lang==='cs'?'Vrať se brzy pro nové profily!':'Come back soon for new profiles!'}</p>
          <button onclick="loadMatches()" class="btn btn-primary">${lang==='cs'?'Zobrazit shody':'View Matches'}</button>
        </div>
      </div>`
    return
  }

  const p = discoverProfiles[discoverIdx]
  const c = discoverCompats[p.birthday]

  $('discover-content').innerHTML = navHtml + `
    <div style="max-width:480px;margin:0 auto;padding:0 1rem 2rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;color:rgba(255,255,255,0.4);font-size:.8rem">
        <span>${discoverIdx+1} / ${discoverProfiles.length}</span>
        <span>← / → ${lang==='cs'?'klávesy':'keys'}</span>
      </div>
      <div class="card profile-card" id="profile-card" style="padding:1.5rem">
        <div style="display:flex;align-items:flex-start;gap:1rem;margin-bottom:1.25rem">
          ${avatarEl(p.name)}
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.25rem">
              <h2 style="font-size:1.2rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</h2>
              ${p.birth_year?`<span style="color:rgba(255,255,255,0.45);font-size:.8rem;white-space:nowrap">${new Date().getFullYear()-p.birth_year} ${lang==='cs'?'let':'y/o'}</span>`:''}
            </div>
            ${(p.city||p.country)?`<p style="color:rgba(255,255,255,0.5);font-size:.8rem">📍 ${[p.city,p.country].filter(Boolean).join(', ')}</p>`:''}
            <p style="color:rgba(255,255,255,0.35);font-size:.75rem;margin-top:.2rem">📅 ${lang==='cs'?'Narozen/a':'Born'}: ${p.birthday}</p>
          </div>
          ${c?scoreRing(c.score):''}
        </div>
        <div style="margin-bottom:1rem">
          <p style="color:rgba(255,255,255,0.45);font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:.4rem">${lang==='cs'?'Kompatibilita':'Compatibility'}</p>
          ${compatBadges(c,lang)}
        </div>
        ${p.bio?`<div style="margin-bottom:1rem"><p style="color:rgba(255,255,255,0.45);font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:.4rem">${lang==='cs'?'O mně':'About'}</p><p style="color:rgba(255,255,255,0.8);font-size:.875rem;line-height:1.6">${p.bio}</p></div>`:''}
        ${p.hobbies?.length?`<div style="margin-bottom:1.25rem"><p style="color:rgba(255,255,255,0.45);font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:.4rem">${lang==='cs'?'Koníčky':'Hobbies'}</p><div style="display:flex;flex-wrap:wrap;gap:.35rem">${p.hobbies.map(h=>`<span style="font-size:.75rem;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:9999px;padding:.2rem .6rem;color:rgba(255,255,255,0.65)">${h}</span>`).join('')}</div></div>`:''}
        <div style="display:flex;gap:1rem">
          <button onclick="doSwipe(false)" class="btn btn-secondary" style="flex:1;font-size:1.5rem;padding:.85rem">✕</button>
          <button onclick="doSwipe(true)" class="btn btn-primary" style="flex:1;font-size:1.5rem;padding:.85rem">${c?.is_mutual?'↔ 💜':'💜'}</button>
        </div>
      </div>
      <p style="text-align:center;color:rgba(255,255,255,0.2);font-size:.75rem;margin-top:.75rem">← ${lang==='cs'?'přeskočit':'pass'}  ·  → ${lang==='cs'?'líbí se mi':'like'}</p>
    </div>`

  // Keyboard nav
  document.onkeydown = (e) => {
    if(document.querySelector('.page.active')?.id!=='discover') return
    if(e.key==='ArrowRight'||e.key==='l') doSwipe(true)
    if(e.key==='ArrowLeft'||e.key==='d') doSwipe(false)
  }
}

async function doSwipe(liked) {
  if(!user||discoverIdx>=discoverProfiles.length) return
  const target = discoverProfiles[discoverIdx]
  const card = $('profile-card')
  if(card) { card.classList.add(liked?'swipe-like':'swipe-pass') }
  await new Promise(r=>setTimeout(r,280))

  await db.from('likes').upsert({from_user:user.id, to_user:target.id, liked})

  if(liked) {
    const {data:theyLiked} = await db.from('likes').select('id').eq('from_user',target.id).eq('to_user',user.id).eq('liked',true).maybeSingle()
    if(theyLiked) {
      const ua = user.id < target.id ? user.id : target.id
      const ub = user.id < target.id ? target.id : user.id
      await db.from('matches').upsert({user_a:ua, user_b:ub})
      toast(lang==='cs'?`🎉 Shoda s ${target.name}!`:`🎉 Matched with ${target.name}!`)
    }
  }
  discoverIdx++
  renderDiscover()
}

// MATCHES
// ═══════════════════════════════════════════════════
let matchTab = 'matches'
async function loadMatches() {
  show('matches')
  matchTab='matches'
  $('matches-content').innerHTML = `<div style="text-align:center;padding:4rem"><span style="font-size:3rem" class="spinner">🪐</span></div>`

  const navHtml = `
    <nav style="max-width:640px;margin:0 auto;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between">
      <a href="#" onclick="showLanding()" style="display:flex;align-items:center;gap:.5rem;text-decoration:none;color:white"><span style="font-size:1.25rem">🪐</span><strong>Cosmatch</strong></a>
      <button onclick="loadDiscover()" class="btn btn-secondary" style="font-size:.875rem;padding:.5rem 1rem">🔍 ${lang==='cs'?'Objevovat':'Discover'}</button>
    </nav>`

  // Fetch matches
  const {data:matchData} = await db.from('matches').select('*').or(`user_a.eq.${user.id},user_b.eq.${user.id}`)
  const matchIds = (matchData||[]).map(m=>m.user_a===user.id?m.user_b:m.user_a)

  // Fetch cosmic mutual (all profiles with mutual compat birthday)
  const {data:cosmicC} = await db.from('compatibility').select('date_b,is_mutual,score').eq('date_a',user.birthday).eq('is_mutual',true).order('score',{ascending:false}).limit(100)
  const cosmicBdays = (cosmicC||[]).map(c=>c.date_b)

  let matchProfiles=[], cosmicProfiles=[], compatMap={}

  if(matchIds.length>0) {
    const {data} = await db.from('profiles').select('*').in('id',matchIds)
    matchProfiles = data||[]
  }
  if(cosmicBdays.length>0) {
    const {data} = await db.from('profiles').select('*').in('birthday',cosmicBdays).neq('id',user.id).limit(60)
    cosmicProfiles = data||[]
  }

  const allBdays=[...new Set([...matchProfiles.map(p=>p.birthday),...cosmicProfiles.map(p=>p.birthday)])]
  if(allBdays.length>0) {
    const {data:cd} = await db.from('compatibility').select('*').eq('date_a',user.birthday).in('date_b',allBdays)
    cd?.forEach(c=>compatMap[c.date_b]=c)
  }

  const renderList = (list, emptyMsg, extra='') => {
    if(!list.length) return `<div class="card" style="padding:3rem;text-align:center"><div style="font-size:2.5rem;margin-bottom:1rem">✨</div><p style="color:rgba(255,255,255,0.55)">${emptyMsg}</p>${extra}</div>`
    return list.map(p=>{
      const c=compatMap[p.birthday]
      return `<div class="card" style="padding:1rem;display:flex;align-items:center;gap:1rem;margin-bottom:.6rem">
        ${avatarEl(p.name,'sm')}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.25rem">
            <strong style="font-size:.95rem">${p.name}</strong>
            ${p.birth_year?`<span style="color:rgba(255,255,255,0.4);font-size:.75rem">${new Date().getFullYear()-p.birth_year}y</span>`:''}
            ${p.city?`<span style="color:rgba(255,255,255,0.4);font-size:.75rem">· ${p.city}</span>`:''}
          </div>
          <div>${c?compatBadges(c,lang):'<span style="color:rgba(255,255,255,0.3);font-size:.75rem">No data</span>'}</div>
        </div>
        ${c?scoreRing(c.score):''}
      </div>`
    }).join('')
  }

  const tabs = [
    {key:'matches',label:`💜 ${lang==='cs'?'Shody':'Matches'}`,count:matchProfiles.length},
    {key:'cosmic',label:`🌌 ${lang==='cs'?'Kosmické':'Cosmic'}`,count:cosmicProfiles.length},
  ]

  window._matchData = {matchProfiles, cosmicProfiles, compatMap, renderList}

  $('matches-content').innerHTML = navHtml + `
    <div style="max-width:640px;margin:0 auto;padding:0 1rem 3rem">
      <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:1.25rem">${lang==='cs'?'Tvoje shody':'Your Matches'}</h1>
      <div style="display:flex;gap:.5rem;margin-bottom:1.25rem">
        ${tabs.map(t=>`<button onclick="switchMatchTab('${t.key}')" id="tab-${t.key}" class="btn" style="flex:1;font-size:.875rem;padding:.65rem;${t.key===matchTab?'background:linear-gradient(135deg,#9333ea,#ec4899);color:white':'background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6)'}">${t.label} ${t.count>0?`<span style="margin-left:.25rem;font-size:.7rem;background:rgba(255,255,255,0.2);padding:.1rem .4rem;border-radius:9999px">${t.count}</span>`:''}</button>`).join('')}
      </div>
      <div id="match-list">
        ${renderList(matchProfiles, lang==='cs'?'Zatím žádné shody. Pokračuj v objevování!':'No matches yet. Keep discovering!',`<br><button onclick="loadDiscover()" class="btn btn-primary" style="margin-top:.75rem">${lang==='cs'?'Objevovat':'Discover'}</button>`)}
      </div>
      ${matchTab==='cosmic'?`<div class="card" style="padding:.75rem 1rem;background:rgba(8,145,178,0.15);border-color:rgba(8,145,178,0.3);margin-bottom:1rem"><p style="color:#67e8f9;font-size:.8rem">🌌 ${lang==='cs'?'Kosmická kompatibilita podle data narození — nezávisle na swipování.':'Cosmic compatibility by birthday — independent of swipes.'}</p></div>`:''}
    </div>`
}

function switchMatchTab(tab) {
  matchTab=tab
  const {matchProfiles,cosmicProfiles,renderList} = window._matchData||{}
  if(!renderList) return
  document.querySelectorAll('[id^="tab-"]').forEach(b=>{
    b.style.background=b.id===`tab-${tab}`?'linear-gradient(135deg,#9333ea,#ec4899)':'rgba(255,255,255,0.08)'
    b.style.color=b.id===`tab-${tab}`?'white':'rgba(255,255,255,0.6)'
  })
  $('match-list').innerHTML = tab==='matches'
    ? renderList(matchProfiles, lang==='cs'?'Zatím žádné shody.':'No matches yet.', `<br><button onclick="loadDiscover()" class="btn btn-primary">${lang==='cs'?'Objevovat':'Discover'}</button>`)
    : `${tab==='cosmic'?`<div class="card" style="padding:.75rem 1rem;background:rgba(8,145,178,0.15);border-color:rgba(8,145,178,0.3);margin-bottom:1rem"><p style="color:#67e8f9;font-size:.8rem">🌌 ${lang==='cs'?'Všichni s oboustrannou kosmickou kompatibilitou (bez ohledu na lajky).':'All users with mutual cosmic compatibility (regardless of likes).'}</p></div>`:''}`
    + renderList(cosmicProfiles, lang==='cs'?'Žádné kosmické shody s registrovanými uživateli.':'No cosmic matches with registered users.')
}
